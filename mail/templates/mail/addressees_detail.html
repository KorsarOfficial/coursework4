{% extends 'mail/base.html' %}
{% block title %}Страница пользователя{% endblock %}
{% block content %}
<body>
    <h1>Информация о пользователе</h1>
    <p>Полное имя: {{ object.full_name }}</p>
    <p>Почта: {{ object.email }}</p>
    <p>Комментарий: {{ object.comment }}</p>
    <a class="btn btn-primary" href="{% url 'mail:addressees_list' %}" role="button">Назад</a>
</body>
{% endblock %}
