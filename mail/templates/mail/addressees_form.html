{% extends 'mail/base.html' %}
{% block title %}Добавить нового адресата{% endblock %}
{% block content %}
<div class="container">
    <div class="row text-start">
        <div class="col-12">
            <div class="card mb-4 box-shadow">
                <div class="card-body">
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        {{ form.as_p }}
                        {% if object %}
                        <button type="submit" class="btn btn-lg btn-block btn-outline-primary">Изменить</button>
                        {% else %}
                        <button type="submit" class="btn btn-lg btn-block btn-outline-primary">Добавить</button>
                        {% endif %}
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
